<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Beranda</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(#0f2027, #203a43, #2c5364);
    min-height: 100vh;
    color: white;
}
.card {
    background: rgba(225, 225, 225, 0.1);
    border-radius: 15px;
    text-align: center;
    height: 100%;
}
.summary-box {
    background: rgba(225, 225, 225, 0.1);
    border-radius: 15px;
    padding: 20px;
}
.product-card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}
.product-card img {
    width: 100px;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="#">Store</a>
    <div class="collapse navbar-collapse" id="navbarMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="home page.html">Beranda</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="aboutus.html">About Us</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="product.html">Product</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container py-5">
    <h2 class="text-center mb-4">Computer Product</h2>

<!-- PRODUCT LIST -->
<div class="row g-4">

<div class="col-md-4">
<div class="product-card">
<img src="mos.webp">
<h5>Mouse</h5>
<p>Rp 150.000</p>
<button class="btn btn-primary" onclick="addProduct('Mouse', 150000)">Buy</button>
</div>
</div>

<div class="col-md-4">
<div class="product-card">
<img src="head.webp">
<h5>Headphone</h5>
<p>Rp 150.000</p>
<button class="btn btn-primary" onclick="addProduct('Headphone', 150000)">Buy</button>
</div>
</div>

<div class="col-md-4">
<div class="product-card">
<img src="spe.webp">
<h5>Speaker</h5>
<p>Rp 100.000</p>
<button class="btn btn-primary" onclick="addProduct('Speaker', 100000)">Buy</button>
</div>
</div>

</div>

<!-- PURCHASE DETAILS -->
<div class="row mt-5">
  <div class="col-md-8 mx-auto">
    <div class="summary-box">
      <h4>Purchase Detail</h4>
      <hr>

      <div id="itemList"></div>

      <h5>Total Price:</h5>
      <h3 id="totalPrice">Rp 0</h3>

      <button class="btn btn-success w-100 mt-3" onclick="payNow()">Pay Now</button>
    </div>
  </div>
</div>

</div>

<script>
let cart = {};
let total = 0;

let itemList = document.getElementById("itemList");
let totalPrice = document.getElementById("totalPrice");

function addProduct(name, price) {
  if (cart[name]) {
    cart[name].qty += 1;
  } else {
    cart[name] = {
      qty: 1,
      price: price
    };
  }
  total += price;
  updateCart();
}

function updateCart() {
  itemList.innerHTML = "";

  for (let item in cart) {
    let div = document.createElement("div");
    div.innerHTML = `
      <strong>${item}</strong> (${cart[item].qty}) - Rp ${(cart[item].qty * cart[item].price).toLocaleString()}
    `;
    itemList.appendChild(div);
  }

  totalPrice.innerText = "Rp " + total.toLocaleString();
}

function payNow() {
  alert("Thank you for your purchase!");
}
</script>

</body>
</html>
