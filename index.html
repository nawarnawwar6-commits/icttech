<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Abidin Tech International</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(#0f2027, #203a43, #2c5364);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <h3 class="fw-bold mb-2">Abidin Tech International</h3>
        <p class="mb-4">Login to continue</p>
        
        <input type="text" id="username" class="form-control mb-3" placeholder="Username">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">
        
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
        
        <p class="text-danger mt-3" id="message"></p>
    </div>

    <script>
        // Menyimpan data login di browser (hanya untuk keperluan belajar)
        localStorage.setItem("username", "student");
        localStorage.setItem("password", "12345");

        function login() {
            // Mengambil input dari user
            let inputUsername = document.getElementById("username").value;
            let inputPassword = document.getElementById("password").value;

            // Mengambil data yang tersimpan di localStorage
            let savedUsername = localStorage.getItem("username");
            let savedPassword = localStorage.getItem("password");

            // Mengecek apakah username DAN password benar
            if (inputUsername === savedUsername && inputPassword === savedPassword) {
                // Jika benar, pindah ke halaman dashboard
                window.location.href = "home page.html"; 
            } else {
                // Jika salah, tampilkan pesan error
                document.getElementById("message").innerText = "Username or password is incorrect!";
            }
        }
    </script>

</body>
</html>
